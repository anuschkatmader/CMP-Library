<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vodafone TV – Demo</title>

<style>
:root{
  --bg0:#050006;
  --bg1:#120018;
  --bg2:#2b0018;
  --txt:#ffffff;
  --muted:#b5b5bf;
  --accent:#e60000;
  --radius:14px;
  --radiusSm:12px;
  --navH:92px;
  --railW:72px;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}

body{
  font-family:Segoe UI, Arial, sans-serif;
  background:
    radial-gradient(1200px 600px at 35% 0%, #2f0043 0%, transparent 60%),
    linear-gradient(180deg,#050007,#000);
  color:var(--txt);
  overflow:hidden;
}

/* ================= HEADER ================= */
header{
  height:var(--navH);
  display:flex;
  align-items:center;
  padding:0 36px;
  background:linear-gradient(to bottom,rgba(0,0,0,.85),rgba(0,0,0,.3));
  backdrop-filter:blur(10px);
}

.brand{
  display:flex;align-items:center;gap:10px;
  min-width:220px;
  font-weight:700;
}
.brand-dot{
  width:26px;height:26px;border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 12px var(--accent);
}
.brand span{font-weight:400}

.top-nav{
  margin:0 auto;
  display:flex;
  gap:84px;
  letter-spacing:.8px;
  font-size:16px;
  text-transform:uppercase;
}
.top-nav .active{
  position:relative;
}
.top-nav .active::after{
  content:"";
  position:absolute;
  bottom:-14px;
  left:50%;
  transform:translateX(-50%);
  width:48px;height:3px;
  background:#fff;
  border-radius:3px;
}

.top-right{
  min-width:260px;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:14px;
}
.clock{font-size:13px}
.live-dot{
  width:12px;height:12px;border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 8px var(--accent);
}
.profile-btn{
  padding:8px 16px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.6);
  background:rgba(0,0,0,.25);
  color:#fff;
}

/* ================= APP ================= */
.app{
  height:calc(100vh - var(--navH));
  display:grid;
  grid-template-columns:var(--railW) 1fr;
}

/* LEFT RAIL */
.rail{
  padding-top:18px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
  background:linear-gradient(to right,rgba(0,0,0,.5),transparent);
}
.rail-btn{
  width:44px;height:44px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(0,0,0,.3);
  display:flex;
  align-items:center;
  justify-content:center;
}
.rail-btn svg{
  width:20px;height:20px;
  stroke:#fff;fill:none;stroke-width:2;
}

/* CONTENT */
main{
  padding:16px 28px;
  overflow:hidden;
}

.top-grid{
  display:grid;
  grid-template-columns:560px 1fr;
  gap:22px;
}
.stack{display:flex;flex-direction:column;gap:18px}
.grid-right{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

/* CARDS */
.card{
  position:relative;
  border-radius:var(--radius);
  overflow:hidden;
  border:1px solid rgba(255,255,255,.12);
  background:#111;
  transition:.25s;
}
.card.focused{
  transform:scale(1.06);
  box-shadow:0 0 0 3px #fff,0 28px 60px rgba(0,0,0,.85);
  z-index:5;
}

.hero{height:315px}
.feature{height:165px}
.small{height:150px}
.tile{width:280px;height:158px}

.poster img{
  width:100%;height:100%;
  object-fit:cover;
}

.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.82),transparent 55%);
}

.overlay{
  position:absolute;
  left:16px;
  bottom:14px;
}
.title{
  font-size:22px;font-weight:600;
}
.small .title,.tile .title{font-size:14px}

.meta{
  display:none;
  font-size:12px;
  opacity:.9;
}
.recording .meta{display:block}

.badge{
  position:absolute;
  top:12px;left:12px;
  background:var(--accent);
  padding:4px 10px;
  border-radius:999px;
  font-size:11px;
}

/* SECTION */
.section{margin-top:24px}
.section-title{
  margin-bottom:14px;
  font-size:16px;
  letter-spacing:1px;
}
.carousel{display:flex;gap:16px}

/* PROFILE */
#profileOverlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(14px);
  display:none;
}
#profileOverlay.active{display:block}
.profile-box{
  width:900px;max-width:90%;
  margin:80px auto;
  background:#0c0c14;
  border-radius:18px;
  padding:28px;
}

/* FOCUS */
[tabindex="0"]:focus{outline:none}
</style>
</head>

<body>

<header>
  <div class="brand"><div class="brand-dot"></div>Vodafone <span>TV</span></div>
  <div class="top-nav">
    <div class="active">MEIN TV</div>
    <div>TV‑GUIDE</div>
    <div>JETZT ANSEHEN</div>
  </div>
  <div class="top-right">
    <div class="clock" id="clock"></div>
    <div class="live-dot"></div>
    <button class="profile-btn" id="profileBtn" tabindex="0">Mein Profil</button>
  </div>
</header>

<div class="app">
  <aside class="rail">
    <button class="rail-btn focused" tabindex="0"><svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 10.5V21h14V10.5"/><path d="M9 21v-6h6v6"/></svg></button>
    <button class="rail-btn" tabindex="0"><svg viewBox="0 0 24 24"><rect x="5" y="6" width="14" height="12" rx="2"/><circle cx="12" cy="12" r="2"/></svg></button>
    <button class="rail-btn" tabindex="0"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6"/><path d="M20 20l-4.2-4.2"/></svg></button>
  </aside>

  <main>
    <section class="top-grid">
      <div class="stack">
        <div class="card hero recording focused" tabindex="0" data-title="The Rookie">
          <div class="poster"><img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=1600&q=80"></div>
          <div class="badge">AUFNAHME</div>
          <div class="overlay">
            <div class="title">The Rookie</div>
            <div class="meta">14:10 Uhr · HD</div>
          </div>
        </div>

        <div class="card feature recording" tabindex="0" data-title="Ersparte: Alles oder Nichts">
          <div class="poster"><img src="https://images.unsplash.com/photo-1529333166437-7750a6dd5a70?auto=format&fit=crop&w=1600&q=80"></div>
          <div class="overlay">
            <div class="title">Ersparte: Alles oder Nichts</div>
            <div class="meta">13:45 Uhr</div>
          </div>
        </div>
      </div>

      <div class="grid-right">
        <div class="card small" tabindex="0" data-title="Cosmo Sapiens"><div class="poster"><img src="https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=1200&q=80"></div><div class="overlay"><div class="title">Cosmo Sapiens</div></div></div>
        <div class="card small" tabindex="0" data-title="Die Rezepte des Tages"><div class="poster"><img src="https://images.unsplash.com/photo-1498575207490-84fef63b5467?auto=format&fit=crop&w=1200&q=80"></div><div class="overlay"><div class="title">Die Rezepte des Tages</div></div></div>
        <div class="card small" tabindex="0" data-title="In Therapie"><div class="poster"><img src="https://images.unsplash.com/photo-1524758631624-e2822e304c36?auto=format&fit=crop&w=1200&q=80"></div><div class="badge">NEU</div><div class="overlay"><div class="title">In Therapie</div></div></div>
        <div class="card small" tabindex="0" data-title="Kanal Spotlight"><div class="poster"><img src="https://images.unsplash.com/photo-1518972559570-7cc1309f3229?auto=format&fit=crop&w=1200&q=80"></div><div class="overlay"><div class="title">Kanal Spotlight</div></div></div>
        <div class="card small" tabindex="0" data-title="Back to Life"><div class="poster"><img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80"></div><div class="overlay"><div class="title">Back to Life</div></div></div>
        <div class="card small" tabindex="0" data-title="Personal Assistant"><div class="poster"><img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=1200&q=80"></div><div class="overlay"><div class="title">Personal Assistant</div></div></div>
      </div>
    </section>
  </main>
</div>

<script>
/* CLOCK */
function pad(n){return String(n).padStart(2,"0")}
function updateClock(){
  const d=new Date();
  document.getElementById("clock").textContent=`${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
updateClock();setInterval(updateClock,10000);

/* SPATIAL REMOTE NAV */
let current=document.querySelector('.card.hero');

function focusables(){
  return [...document.querySelectorAll('[tabindex="0"]')].filter(e=>e.offsetParent!==null);
}
function setFocus(el){
  document.querySelectorAll('.focused').forEach(e=>e.classList.remove('focused'));
  el.classList.add('focused');
  el.focus();
  current=el;
}
function center(r){return {x:r.left+r.width/2,y:r.top+r.height/2}}

document.addEventListener('keydown',e=>{
  const list=focusables();
  if(!current)return;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)){
    e.preventDefault();
    const c=center(current.getBoundingClientRect());
    let best=null,score=1e9;
    list.forEach(el=>{
      if(el===current)return;
      const r=el.getBoundingClientRect();
      const p=center(r);
      const dx=p.x-c.x,dy=p.y-c.y;
      if(e.key==='ArrowLeft'&&dx>=0)return;
      if(e.key==='ArrowRight'&&dx<=0)return;
      if(e.key==='ArrowUp'&&dy>=0)return;
      if(e.key==='ArrowDown'&&dy<=0)return;
      const s=Math.hypot(dx,dy);
      if(s<score){score=s;best=el}
    });
    if(best)setFocus(best);
  }
  if(e.key==='Enter'&&current.dataset.title){
    console.log('Abspielen:',current.dataset.title);
  }
});

setFocus(current);
</script>

</body>
</html>
