<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TV App UI – Vodafone‑style</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    /* =====================
       GLOBAL RESET & BASICS
       ===================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(135deg, #1b0125, #000000, #2b0000);
      color: #ddd;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    :focus {
      outline: none;
    }

    /* =====================
       TOP NAVIGATION BAR
       ===================== */
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      display: flex;
      align-items: center;
      padding: 0 60px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .menu {
      display: flex;
      gap: 50px;
    }

    .menu-item {
      font-size: 20px;
      text-transform: uppercase;
      color: #aaa;
      cursor: pointer;
      position: relative;
    }

    .menu-item.active {
      color: #fff;
    }

    .menu-item.active::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -10px;
      width: 100%;
      height: 3px;
      background: #e60000;
      box-shadow: 0 0 12px #e60000;
    }

    .nav-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 20px;
      color: #fff;
    }

    .live-dot {
      width: 12px;
      height: 12px;
      background: #e60000;
      border-radius: 50%;
      box-shadow: 0 0 8px #e60000;
    }

    /* =====================
       MAIN CONTENT AREA
       ===================== */
    main {
      padding-top: 120px;
      padding-left: 60px;
      padding-right: 60px;
    }

    /* =====================
       ROW STRUCTURE
       ===================== */
    .row {
      margin-bottom: 50px;
    }

    .row-title {
      font-size: 22px;
      margin-bottom: 20px;
      text-transform: uppercase;
      color: #bbb;
    }

    .rail {
      display: flex;
      gap: 24px;
      transition: transform 0.35s ease;
    }

    /* =====================
       HERO CARD
       ===================== */
    .hero-card {
      width: 520px;
      height: 290px;
      border-radius: 12px;
      background: linear-gradient(120deg, #333, #111);
      position: relative;
      flex-shrink: 0;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .hero-card.focused {
      transform: scale(1.07);
      box-shadow: 0 0 0 3px #fff, 0 25px 50px rgba(0,0,0,0.8);
    }

    .hero-info {
      position: absolute;
      bottom: 20px;
      left: 20px;
    }

    .hero-badge {
      font-size: 12px;
      background: rgba(0,0,0,0.6);
      padding: 4px 10px;
      border-radius: 6px;
      margin-bottom: 6px;
      display: inline-block;
    }

    .hero-title {
      font-size: 26px;
      color: #fff;
    }

    /* =====================
       CONTENT TILES
       ===================== */
    .tile {
      width: 240px;
      height: 135px;
      border-radius: 10px;
      background: linear-gradient(135deg, #444, #222);
      position: relative;
      flex-shrink: 0;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .tile.focused {
      transform: scale(1.12);
      box-shadow: 0 0 0 3px #e60000, 0 20px 40px rgba(0,0,0,0.7);
      z-index: 2;
    }

    .tile-info {
      position: absolute;
      bottom: 10px;
      left: 10px;
      right: 10px;
      font-size: 14px;
      color: #fff;
    }

    .meta {
      font-size: 11px;
      color: #ccc;
      margin-top: 4px;
    }

    /* =====================
       ACCESSIBILITY HELPER
       ===================== */
    .sr-only {
      position: absolute;
      left: -9999px;
    }
  </style>
</head>

<body>

  <!-- =====================
       TOP NAVIGATION
       ===================== -->
  <header class="top-nav">
    <nav class="menu">
      <div class="menu-item active">MI TV</div>
      <div class="menu-item">GUÍA TV</div>
      <div class="menu-item">VER AHORA</div>
    </nav>

    <div class="nav-right">
      <span id="clock">14:39</span>
      <span class="live-dot"></span>
    </div>
  </header>

  <!-- =====================
       MAIN CONTENT
       ===================== -->
  <main>

    <!-- HERO ROW -->
    <section class="row" data-row="0">
      <div class="rail">
        <div class="hero-card focused" tabindex="0">
          <div class="hero-info">
            <div class="hero-badge">Grabaciones</div>
            <div class="hero-title">The Rookie</div>
          </div>
        </div>
      </div>
    </section>

    <!-- CONTENT ROW 1 -->
    <section class="row" data-row="1">
      <div class="row-title">Grabaciones</div>
      <div class="rail">
        <div class="tile" tabindex="0">
          <div class="tile-info">
            Como Sapiens
            <div class="meta">14:10 · HD</div>
          </div>
        </div>

        <div class="tile" tabindex="0">
          <div class="tile-info">
            La ruleta
            <div class="meta">14:35</div>
          </div>
        </div>

        <div class="tile" tabindex="0">
          <div class="tile-info">
            Back to Life
            <div class="meta">Nueva</div>
          </div>
        </div>

        <div class="tile" tabindex="0">
          <div class="tile-info">
            Personal Assistant
            <div class="meta">Serie</div>
          </div>
        </div>
      </div>
    </section>

    <!-- CONTENT ROW 2 -->
    <section class="row" data-row="2">
      <div class="row-title">Tendencias</div>
      <div class="rail">
        <div class="tile" tabindex="0">
          <div class="tile-info">
            Rick Stein’s India
            <div class="meta">Documental</div>
          </div>
        </div>

        <div class="tile" tabindex="0">
          <div class="tile-info">
            Las claves
            <div class="meta">Actualidad</div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- =====================
       JAVASCRIPT LOGIC
       ===================== -->
  <script>
    const rows = Array.from(document.querySelectorAll(".row"));
    let currentRow = 0;
    let currentIndex = 0;

    function updateFocus() {
      rows.forEach((row, rIndex) => {
        const items = row.querySelectorAll(".hero-card, .tile");
        items.forEach((item, iIndex) => {
          item.classList.toggle(
            "focused",
            rIndex === currentRow && iIndex === currentIndex
          );
          if (rIndex === currentRow && iIndex === currentIndex) {
            item.focus();
          }
        });
      });
    }

    document.addEventListener("keydown", (e) => {
      const items = rows[currentRow].querySelectorAll(".hero-card, .tile");

      switch (e.key) {
        case "ArrowRight":
          currentIndex = Math.min(currentIndex + 1, items.length - 1);
          break;

        case "ArrowLeft":
          currentIndex = Math.max(currentIndex - 1, 0);
          break;

        case "ArrowDown":
          if (rows[currentRow + 1]) {
            currentRow++;
            currentIndex = 0;
          }
          break;

        case "ArrowUp":
          if (rows[currentRow - 1]) {
            currentRow--;
            currentIndex = 0;
          }
          break;

        case "Enter":
          console.log("Playing content...");
          alert("Playing content…");
          break;
      }

      updateFocus();
    });

    // Initial focus
    updateFocus();
  </script>

</body>
</html>
``
